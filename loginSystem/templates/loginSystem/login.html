{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - CyberPanel</title>
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" type="text/css" href="{% static 'baseTemplate/assets/css/design-system.css' %}?v={{ CP_VERSION }}">
    
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color var(--transition);
        }
        
        [data-theme="dark"] body {
            background-color: #0a0a0a;
        }

        .login-card {
            background: var(--bg-primary);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header img {
            height: 48px;
            margin-bottom: 16px;
        }

        .login-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px 0;
        }

        .login-header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            pointer-events: none;
        }

        .input-group input, .input-group select {
            width: 100%;
            height: 40px;
            padding: 0 12px 0 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            transition: border-color var(--transition);
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-subtle);
        }

        .input-action {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            border: none;
            background: none;
            padding: 0;
        }
        
        .input-action:hover {
            color: var(--text-primary);
        }

        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 12px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .forgot-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color var(--transition);
        }

        .forgot-link:hover {
            color: var(--text-primary);
        }

        .btn-submit {
            width: 100%;
            height: 40px;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .alert {
            display: none;
            margin-top: 16px;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .alert-danger {
            background: var(--danger-subtle);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        #verifyingLogin {
            display: none;
            margin-top: 16px;
            text-align: center;
        }

        .spinner-border {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            vertical-align: text-bottom;
            border: 0.2em solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border .75s linear infinite;
        }

        @keyframes spinner-border {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body ng-app="loginSystem" ng-controller="loginSystem">

    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <i class="ti ti-moon" id="theme-icon"></i>
    </button>

    <div class="login-card">
        <div class="login-header">
            <img src="https://cyberpanel.net/wp-content/uploads/2025/04/cyberpanel-logo-icon_only.png" alt="CyberPanel Logo">
            <h1>CyberPanel</h1>
            <p>Server Management Platform</p>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <i class="ti ti-user input-icon"></i>
                <input type="text" ng-model="username" name="username" placeholder="Username or Email" required>
            </div>

            <div class="input-group">
                <i class="ti ti-lock input-icon"></i>
                <input type="password" ng-model="password" id="password" name="password" placeholder="Password" ng-keypress="initiateLogin($event)" required autocomplete="current-password">
                <button type="button" class="input-action" onclick="togglePassword()" title="Show password">
                    <i class="ti ti-eye" id="toggle-pwd-icon"></i>
                </button>
            </div>

            <div class="input-group" ng-hide="verifyCode">
                <i class="ti ti-shield-lock input-icon"></i>
                <input type="text" ng-model="twofa" name="twofa" placeholder="Authenticator Code" required>
            </div>

            <div class="input-group">
                <i class="ti ti-language input-icon"></i>
                <select ng-model="languageSelection" ng-init="languageSelection='english'">
                    <option value="english">English</option>
                    <option>Bangla</option>
                    <option>Bosnian</option>
                    <option>Bulgarian</option>
                    <option>Chinese</option>
                    <option>French</option>
                    <option>German</option>
                    <option>Greek</option>
                    <option>Italian</option>
                    <option>Indonesian</option>
                    <option>Japanese</option>
                    <option>Polish</option>
                    <option>Portuguese</option>
                    <option>Russian</option>
                    <option>Spanish</option>
                    <option>Turkish</option>
                    <option>Vietnamese</option>
                </select>
            </div>

            <div class="login-options">
                <label class="checkbox-wrapper">
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="button" class="btn-submit" ng-click="verifyLoginCredentials()">
                Sign in
            </button>

            <div id="verifyingLogin">
                <div class="spinner-border text-primary" role="status"></div>
                <span class="sr-only">Verifying...</span>
            </div>
            
            <div id="loginFailed" class="alert alert-danger" style="display: none;" ng-style="{'display': errorMessage ? 'flex' : 'none'}">
                <i class="ti ti-alert-circle"></i>
                <span><span ng-bind="errorMessage"></span></span>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="{% static 'baseTemplate/assets/js-core/jquery-core.min.js' %}"></script>
    <script src="https://code.angularjs.org/1.6.5/angular.min.js"></script>
    <script src="https://code.angularjs.org/1.6.5/angular-route.min.js"></script>
    <script src="{% static 'loginSystem/login-system.js' %}"></script>

    <script>
        // Theme toggle
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('cyberPanelTheme', newTheme);
            
            const icon = document.getElementById('theme-icon');
            icon.className = newTheme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('cyberPanelTheme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';

        // Password visibility toggle
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('toggle-pwd-icon');
            
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.className = 'ti ti-eye-off';
            } else {
                pwdInput.type = 'password';
                icon.className = 'ti ti-eye';
            }
        }
    </script>
</body>
</html>
