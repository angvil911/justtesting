{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light" ng-app="CyberCP">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% trans "Webmail Login - CyberPanel" %}</title>
    
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Design System -->
    <link rel="stylesheet" type="text/css" href="{% static 'baseTemplate/assets/css/design-system.css' %}">
    
    <style>
        body {
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color var(--transition);
        }
        
        [data-theme="dark"] body {
            background-color: #0a0a0a;
        }

        .login-card {
            background: var(--bg-primary);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header i {
            font-size: 48px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .login-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px 0;
        }

        .login-header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            height: 40px;
            padding: 0 12px 0 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            transition: border-color var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-subtle);
        }

        .btn-submit {
            width: 100%;
            height: 40px;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .alert {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--danger-subtle);
            color: var(--danger);
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body ng-controller="webmailLoginCtrl">

    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <i class="ti ti-moon" id="theme-icon"></i>
    </button>

    <div class="login-card">
        <div class="login-header">
            <i class="ti ti-mail"></i>
            <h1>{% trans "CyberPanel Webmail" %}</h1>
            <p>{% trans "Sign in to access your email" %}</p>
        </div>

        <div class="alert" ng-if="errorMsg">
            <i class="ti ti-alert-circle"></i>
            <span>{$ errorMsg $}</span>
        </div>

        <form ng-submit="login()" autocomplete="off">
            <div class="input-group">
                <i class="ti ti-mail input-icon"></i>
                <input type="email" ng-model="email" placeholder="user@example.com" required autofocus>
            </div>

            <div class="input-group">
                <i class="ti ti-lock input-icon"></i>
                <input type="password" ng-model="password" placeholder="{% trans 'Your email password' %}" required>
            </div>

            <button type="submit" class="btn-submit" ng-disabled="loggingIn" style="margin-top: 24px;">
                <span ng-if="!loggingIn">{% trans "Sign In" %}</span>
                <span ng-if="loggingIn"><i class="ti ti-loader ti-spin"></i> {% trans "Signing in..." %}</span>
            </button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="{% static 'baseTemplate/assets/js-core/jquery-core.min.js' %}"></script>
    <script src="https://code.angularjs.org/1.6.5/angular.min.js"></script>
    <script src="https://code.angularjs.org/1.6.5/angular-route.min.js"></script>

    <script>
        // Theme toggle
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('cyberPanelTheme', newTheme);
            
            const icon = document.getElementById('theme-icon');
            icon.className = newTheme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('cyberPanelTheme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').className = savedTheme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';

        var app = angular.module('CyberCP', []);
        app.config(['$interpolateProvider', function($ip) {
            $ip.startSymbol('{$');
            $ip.endSymbol('$}');
        }]);

        function getCookie(name) {
            var value = '; ' + document.cookie;
            var parts = value.split('; ' + name + '=');
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        app.controller('webmailLoginCtrl', function($scope, $http) {
            $scope.email = '';
            $scope.password = '';
            $scope.errorMsg = '';
            $scope.loggingIn = false;

            $scope.login = function() {
                $scope.loggingIn = true;
                $scope.errorMsg = '';
                $http.post('/webmail/api/login', {
                    email: $scope.email,
                    password: $scope.password
                }, {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                }).then(function(resp) {
                    if (resp.data.status === 1) {
                        window.location.href = '/webmail/';
                    } else {
                        $scope.errorMsg = resp.data.error_message || 'Login failed.';
                    }
                    $scope.loggingIn = false;
                }, function(err) {
                    $scope.errorMsg = 'Connection error. Please try again.';
                    $scope.loggingIn = false;
                });
            };
        });
    </script>
</body>
</html>
